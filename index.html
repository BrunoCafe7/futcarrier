o durante a carreira.</div>`}</section></aside></div>`}function lifeOverlay3(){let ev=G.lifeEvent;return `<div class="choice-overlay"><article class="choice-card"><span class="eyebrow">ESCOLHA COM CONSEQUÊNCIAS</span><h2>${ev.title}</h2><p>${ev.text}</p><div class="choice-actions">${ev.choices.map((c,i)=>`<button onclick="G3.life(${i})"><b>${c[0]}</b><small>${c[1]}</small></button>`).join('')}</div></article></div>`}function noticeOverlay3(){return `<div class="choice-overlay"><article class="choice-card"><span class="eyebrow">NOTIFICAÇÃO DA CARREIRA</span><h2>${G.notice.title}</h2><p>${G.notice.text}</p><button class="primary" onclick="G3.notice()">CONTINUAR →</button></article></div>`}function closeNotice3(){G.notice=null;save3();render3()}

function meter3(v,d){return Math.max(0,Math.min(100,Math.round(v+(d>0?Math.max(.5,d*(100-v)/100):d))))}
function competitionKey3(m){if(m.table==='national'||m.tournament==='national')return'national';if(m.table==='continental'||m.tournament==='continental')return'continental';if(m.tournament==='cup'||m.competition===G.season.cupName)return'cup';return'league'}

function allLeaders3(){let S=G.season,teams=league().clubs.map(c=>c[0]);S.leadersByCompetition=S.leadersByCompetition||{league:S.leaders||makeLeaderBoard3(teams),cup:makeLeaderBoard3(teams),continental:makeLeaderBoard3((S.continentalParticipants||teams).slice(0,20)),national:WORLD32.map(n=>({name:credibleNationalName3(n),club:n,goals:0,assists:0}))};S.leaders=S.leadersByCompetition.league;Object.values(S.leadersByCompetition).flat().forEach(x=>{if(!x.name||x.name==='Camisa 9')x.name=club(x.club)?credibleName3(x.club):credibleNationalName3(x.club)});return S.leadersByCompetition}
function credibleNationalName3(n){let first=['Mateo','Gabriel','Lucas','Noah','Liam','Hugo','Youssef','Takefusa','Min-jae','Victor','Daniel','Adam','Ivan','Omar','Samuel','Nicolás'],last=['Silva','Romero','Müller','Martin','Rossi','Costa','Williams','Kovač','El Amrani','Tanaka','Kim','Diallo','Okafor','Nowak','Petrovic','Torres'];let h=hash3('seleção-'+n);return first[h%first.length]+' '+last[Math.floor(h/17)%last.length]}
function updateLeaderBoard3(m,r){let map=allLeaders3(),key=competitionKey3(m),list=map[key];if(!list)return;let team=key==='national'?G.player.country:G.player.club,mine=list.find(x=>x.club===team);if(!mine){mine={name:G.player.name,club:team,goals:0,assists:0};list.push(mine)}mine.name=G.player.name;mine.goals+=m.report.stats.goals;mine.assists+=m.report.stats.assists;list.filter(x=>x!==mine).forEach(x=>{let q=(STRENGTH[x.club]||76)/100;if(r()<q*.42)x.goals+=1+(r()>.96?1:0);if(r()<q*.34)x.assists++})}
function stats3(r,tg){let p=G.player.position,x=POS[p],at=G.player.attributes,minutes=minutes3(r),share=minutes/90,chem=.72+(G.player.synergy+G.player.mental)/500,m=k=>Math.max(.78,Math.min(1.22,1+(at[k]-G.player.overall)/90)),g=0,a=0;for(let i=0;i<tg;i++){if(r()<x.goal*share*chem*m('shooting')*(.93+.07*m('dribbling')))g++;else if(r()<x.assist*share*chem*m('passing'))a++}let shots=Math.round((r()*3+g+(['W','SS','ST'].includes(p)?2:0))*share*m('shooting')),cardRisk={CB:.25,FB:.16,DM:.23,CM:.12,AM:.07,W:.05,SS:.05,ST:.06}[p],yellow=r()<cardRisk*share?1:0,red=yellow&&r()<.055?1:0;return{minutes,goals:g,assists:a,yellow,red,shots,shotsOn:Math.min(shots,Math.round(shots*(.38+r()*.32)*m('shooting'))),xg:+(shots*(.12+r()*.13)).toFixed(2),passes:Math.round((18+r()*38+(['DM','CM','AM'].includes(p)?20:0))*share*m('passing')),passPct:Math.min(96,Math.round((70+r()*16+(G.player.overall-65)*.2)*m('passing'))),keyPasses:Math.round((r()*3+(['CM','AM'].includes(p)?2:0))*share*m('passing')),dribbles:Math.round((r()*4+(['AM','W','SS'].includes(p)?2:0))*share*m('dribbling')),crosses:Math.round((r()*4+(['FB','W'].includes(p)?2:0))*share*m('passing')),tackles:Math.round((r()*4+(['CB','FB','DM'].includes(p)?2:0))*share*m('defending')),interceptions:Math.round((r()*3+(['CB','DM'].includes(p)?2:0))*share*m('defending')),clearances:Math.round((r()*4+(p==='CB'?3:0))*share*m('defending')),duels:Math.round((2+r()*6+(p==='CB'||p==='ST'?2:0))*share*m('physical'))}}

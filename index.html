<body>
<header class="top"><div class="brand">⚽ <b>CARREIRA</b> // JOGO OFFLINE</div><div class="top-meta"><span>SALVAMENTO AUTOMÁTICO</span><button onclick="newCareer()">NOVA CARREIRA</button></div></header>
<div id="app"></div>
<script>
const CLUBS=[
 {name:'Flamengo',code:'FLA',strength:91},{name:'Palmeiras',code:'PAL',strength:92},{name:'Corinthians',code:'COR',strength:84},{name:'São Paulo',code:'SAO',strength:86},{name:'Santos',code:'SAN',strength:80},{name:'Internacional',code:'INT',strength:86},{name:'Grêmio',code:'GRE',strength:84},{name:'Atlético Mineiro',code:'CAM',strength:88},{name:'Fluminense',code:'FLU',strength:85},{name:'Botafogo',code:'BOT',strength:89}
];
const POSITIONS={CB:{name:'Zagueiro',goal:.06,assist:.05,primary:['tackles','interceptions','clearances','duels']},FB:{name:'Lateral',goal:.08,assist:.18,primary:['tackles','crosses','dribbles','interceptions']},DM:{name:'Volante',goal:.09,assist:.14,primary:['tackles','interceptions','passes','keyPasses']},CM:{name:'Meia central',goal:.16,assist:.29,primary:['passes','passPct','keyPasses','assists']},AM:{name:'Camisa 10',goal:.28,assist:.38,primary:['keyPasses','dribbles','shots','assists']},W:{name:'Ponta',goal:.36,assist:.31,primary:['dribbles','crosses','shots','goals']},SS:{name:'Segundo atacante',goal:.47,assist:.25,primary:['goals','assists','shotsOn','dribbles']},ST:{name:'Centroavante',goal:.58,assist:.13,primary:['goals','xg','shotsOn','duels']}};
const NATIONAL={Brasil:['Argentina','Uruguai','Colômbia','Chile','Equador'],Argentina:['Brasil','Uruguai','Colômbia','Chile','Paraguai'],Portugal:['Espanha','França','Alemanha','Itália','Países Baixos'],Espanha:['Portugal','França','Alemanha','Itália','Países Baixos']};
const CONTINENTAL=['River Plate','Nacional','LDU Quito'];
const STRENGTH={...Object.fromEntries(CLUBS.map(c=>[c.name,c.strength])),'River Plate':89,'Nacional':82,'LDU Quito':81,Brasil:94,Argentina:93,Uruguai:86,Colômbia:85,Chile:80,Equador:82,Paraguai:78,Portugal:91,Espanha:92,França:93,Alemanha:90,Itália:89,'Países Baixos':89};
const METRIC_LABEL={minutes:'Minutos',goals:'Gols',assists:'Assistências',shots:'Finalizações',shotsOn:'No alvo',xg:'xG',passes:'Passes certos',passPct:'Precisão de passe',keyPasses:'Passes decisivos',dribbles:'Dribles certos',crosses:'Cruzamentos certos',tackles:'Desarmes',interceptions:'Interceptações',clearances:'Cortes',duels:'Duelos vencidos'};
let game=load()||{screen:'setup',tab:'central',tableView:'league',calendarFilter:'Todos',player:{name:'',country:'Brasil',position:'W',number:7,club:'Santos',overall:69,xp:0,potential:92,age:17},season:null,report:null};
function save(){try{localStorage.setItem('carreira_match_v2',JSON.stringify(game))}catch(e){}}
function load(){try{return JSON.parse(localStorage.getItem('carreira_match_v2'))}catch(e){return null}}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function hash(t){let h=2166136261;for(const c of String(t)){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let t=seed;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^(t>>>15),1|t);r^=r+Math.imul(r^(r>>>7),61|r);return((r^(r>>>14))>>>0)/4294967296}}
function iso(day){let d=new Date(2026,2,1+day);return d.toISOString().slice(0,10)}
function formatDate(v){return new Date(v+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
function roundRobin(teams,double=true){let a=[...teams],rounds=[];if(a.length%2)a.push(null);for(let r=0;r<a.length-1;r++){let f=[];for(let i=0;i<a.length/2;i++){let x=a[i],y=a[a.length-1-i];if(x&&y)f.push(r%2?[y,x]:[x,y])}rounds.push(f);a=[a[0],a[a.length-1],...a.slice(1,-1)]}if(double)rounds.push(...rounds.map(r=>r.map(([h,a])=>[a,h])));return rounds}
function rows(teams){return teams.map(team=>({team,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0,last:null}))}
function makeSeason(){let club=game.player.club,leagueTeams=CLUBS.map(c=>c.name),group=[club,...CONTINENTAL],national=[game.player.country,...NATIONAL[game.player.country]],leagueRounds=roundRobin(leagueTeams),libRounds=roundRobin(group),natRounds=roundRobin(national,false).slice(0,5),schedule=[];function add(rounds,comp,start,gap,table,stage){rounds.forEach((fixtures,i)=>{let mine=fixtures.find(f=>f.includes(table==='national'?game.player.country:club));if(!mine)return;schedule.push({id:comp[0]+i+'-'+start,date:iso(start+i*gap),competition:comp,stage:stage||`Rodada ${i+1}`,home:mine[0],away:mine[1],round:i,fixtures,table,played:false,result:null,report:null})})}add(leagueRounds,'Brasileirão',0,7,'league');add(libRounds,'Libertadores',18,20,'lib','Fase de grupos');add(natRounds,'Eliminatórias',24,38,'national','Data FIFA');let cup=[['Flamengo','Corinthians'],['Palmeiras','São Paulo'],['Santos','Internacional'],['Grêmio','Atlético Mineiro']];[34,82,130].forEach((day,i)=>schedule.push({id:'C'+i,date:iso(day),competition:'Copa do Brasil',stage:['Oitavas de final','Quartas de final','Semifinal'][i],home:i%2?club:cup[i%cup.length][0]===club?club:club,away:i%2?'Fluminense':cup[i%cup.length][0]===club?cup[i%cup.length][1]:cup[i%cup.length][0],round:i,fixtures:null,table:null,played:false,result:null,report:null}));schedule.sort((a,b)=>a.date.localeCompare(b.date));return{year:'2026',index:0,schedule,tables:{league:rows(leagueTeams),lib:rows(group),national:rows(national)},headlines:[{date:'PRÉ-TEMPORADA',text:`${game.player.name} é integrado ao elenco principal do ${club}.`},{date:'EXPECTATIVA',text:`Aos ${game.player.age} anos, a promessa começa com overall ${game.player.overall}.`}],history:[],totals:{games:0,goals:0,assists:0,ratingSum:0},processed:{league:[],lib:[],national:[]}}}
function startCareer(){let n=document.getElementById('playerName').value.trim();if(!n){document.getElementById('playerName').focus();return}game.player.name=n;game.screen='game';game.season=makeSeason();game.tab='central';game.report=null;save();render()}
function newCareer(){if(game.screen==='game'&&!confirm('Começar uma nova carreira e apagar o progresso atual?'))return;localStorage.removeItem('carreira_match_v2');game={screen:'setup',tab:'central',tableView:'league',calendarFilter:'Todos',player:{name:'',country:'Brasil',position:'W',number:7,club:'Santos',overall:69,xp:0,potential:92,age:17},season:null,report:null};render()}
function setPlayer(k,v){game.player[k]=typeof game.player[k]==='number'?+v:v;render()}
function sortedTable(key){return [...game.season.tables[key]].sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team))}
function positionIn(key,team){return sortedTable(key).findIndex(r=>r.team===team)+1}
function updateRow(table,team,gf,ga){let r=table.find(x=>x.team===team);r.p++;r.gf+=gf;r.ga+=ga;r.gd=r.gf-r.ga;if(gf>ga){r.w++;r.pts+=3}else if(gf===ga){r.d++;r.pts++}else r.l++;r.last=gf>ga?'V':gf===ga?'E':'D'}
function goalCount(r,attack,defense){let base=.65+(attack-defense)/22;return Math.max(0,Math.min(5,Math.floor(r()*2.15+Math.max(0,base)+(r()>.83?1:0))))}
function scoreFixture(home,away,r,boostTeam){let hs=(STRENGTH[home]||82)+(home===boostTeam?(game.player.overall-65)*.08:0)+2,as=(STRENGTH[away]||82)+(away===boostTeam?(game.player.overall-65)*.08:0);return[goalCount(r,hs,as),goalCount(r,as,hs)]}
function processRound(match,hg,ag){if(!match.table||game.season.processed[match.table].includes(match.round))return;let table=game.season.tables[match.table],r=rng(hash(match.id+'table'+game.player.name));match.fixtures.forEach(([h,a])=>{let score=(h===match.home&&a===match.away)?[hg,ag]:scoreFixture(h,a,r,match.table==='national'?game.player.country:game.player.club);updateRow(table,h,score[0],score[1]);updateRow(table,a,score[1],score[0])});game.season.processed[match.table].push(match.round)}
function metricStats(r,teamGoals){let p=game.player.position,profile=POSITIONS[p],goals=0,assists=0;for(let i=0;i<teamGoals;i++){if(r()<profile.goal)goals++;else if(r()<profile.assist)assists++}let passes=Math.round(18+r()*38+(['DM','CM','AM'].includes(p)?20:0)),passPct=Math.round(70+r()*18+(game.player.overall-69)*.25),shots=Math.round(r()*3+goals+(['W','SS','ST'].includes(p)?2:0)),shotsOn=Math.min(shots,Math.round(shots*(.42+r()*.35))),dribbles=Math.round(r()*4+(['AM','W','SS'].includes(p)?2:0)),crosses=Math.round(r()*4+(['FB','W'].includes(p)?2:0)),tackles=Math.round(r()*4+(['CB','FB','DM'].includes(p)?2:0)),interceptions=Math.round(r()*3+(['CB','DM'].includes(p)?2:0)),clearances=Math.round(r()*4+(p==='CB'?3:0)),duels=Math.round(2+r()*6+(p==='CB'||p==='ST'?2:0)),keyPasses=Math.round(r()*3+(['CM','AM'].includes(p)?2:0));return{minutes:90,goals,assists,shots,shotsOn,xg:+(shots*(.12+r()*.13)).toFixed(2),passes,passPct,keyPasses,dribbles,crosses,tackles,interceptions,clearances,duels}}
function playNext(){let m=game.season.schedule.find(x=>!x.played);if(!m)return;let team=m.competition==='Eliminatórias'?game.player.country:game.player.club,opp=m.home===team?m.away:m.home,r=rng(hash(game.player.name+m.id+game.player.overall+game.season.history.length)),score=scoreFixture(m.home,m.away,r,team),teamGoals=m.home===team?score[0]:score[1],oppGoals=m.home===team?score[1]:score[0],beforePos=m.table?positionIn(m.table,team):null,stats=metricStats(r,teamGoals),outcome=teamGoals>oppGoals?1:teamGoals===oppGoals?0:-1,primary=POSITIONS[game.player.position].primary,primaryScore=primary.reduce((n,k)=>n+(typeof stats[k]==='number'?stats[k]:0),0),rating=Math.max(5.5,Math.min(10,6.15+outcome*.45+stats.goals*.75+stats.assists*.55+primaryScore*.025+(r()-.5)*.65)),reasons=[];rating=+rating.toFixed(1);let xp=Math.round((rating-6)*12+stats.goals*8+stats.assists*6+primaryScore*.12);xp=Math.max(-5,xp);reasons.push(`Nota ${rating}: ${Math.round((rating-6)*12)} XP`);if(stats.goals)reasons.push(`${stats.goals} gol(s): +${stats.goals*8} XP`);if(stats.assists)reasons.push(`${stats.assists} assistência(s): +${stats.assists*6} XP`);reasons.push(`Ações da posição: +${Math.round(primaryScore*.12)} XP`);let oldOvr=game.player.overall;game.player.xp=Math.max(0,game.player.xp+xp);while(game.player.xp>=100&&game.player.overall<game.player.potential){game.player.xp-=100;game.player.overall++}processRound(m,score[0],score[1]);let afterPos=m.table?positionIn(m.table,team):null,events=[];if(stats.goals)for(let i=0;i<stats.goals;i++)events.push({min:Math.round(12+r()*70),text:`Gol de ${game.player.name}! Finalização precisa.`});if(stats.assists)for(let i=0;i<stats.assists;i++)events.push({min:Math.round(10+r()*75),text:`Assistência de ${game.player.name} cria o gol.`});events.push({min:Math.round(18+r()*24),text:`${METRIC_LABEL[primary[0]]}: ${stats[primary[0]]} no total da partida.`});events.push({min:90,text:`Fim de jogo. Nota ${rating} para ${game.player.name}.`});events.sort((a,b)=>a.min-b.min);m.played=true;m.result={home:score[0],away:score[1]};m.report={team,opp,teamGoals,oppGoals,rating,stats,xp,reasons,oldOvr,newOvr:game.player.overall,beforePos,afterPos,events};game.season.totals.games++;game.season.totals.goals+=stats.goals;game.season.totals.assists+=stats.assists;game.season.totals.ratingSum+=rating;game.season.history.push({date:m.date,competition:m.competition,opponent:opp,rating,xp,oldOvr,newOvr:game.player.overall});let hs=[];if(game.season.totals.games===1)hs.push(`Estreia profissional: ${game.player.name} recebe nota ${rating}.`);if(stats.goals>=2)hs.push(`${game.player.name} decide com ${stats.goals} gols em noite inspirada.`);else if(stats.goals)hs.push(`${game.player.name} balança a rede contra o ${opp}.`);if(rating>=8.5)hs.push(`Atuação de gala: imprensa destaca a nota ${rating} de ${game.player.name}.`);if(rating<6.2)hs.push(`Jovem terá de reagir após atuação abaixo do esperado.`);if(afterPos&&beforePos&&afterPos<beforePos)hs.push(`${team} sobe para ${afterPos}º na tabela.`);if(afterPos&&beforePos&&afterPos>beforePos)hs.push(`${team} cai para ${afterPos}º após a rodada.`);if(game.player.overall>oldOvr)hs.push(`Evolução confirmada: overall de ${oldOvr} para ${game.player.overall}.`);if(!hs.length)hs.push(`${team} ${teamGoals===oppGoals?'empata':teamGoals>oppGoals?'vence':'é derrotado'}; ${game.player.name} fecha com nota ${rating}.`);hs.forEach(text=>game.season.headlines.unshift({date:formatDate(m.date).toUpperCase(),text}));game.report=m.report;save();render()}
function closeReport(){game.report=null;save();render()}
function setTab(t){game.tab=t;save();render()}
function setTable(t){game.tableView=t;render()}
function setFilter(t){game.calendarFilter=t;render()}
function avg(){return game.season.totals.games?(game.season.totals.ratingSum/game.season.totals.games).toFixed(1):'—'}
function badge(team){let c=CLUBS.find(x=>x.name===team);return c?c.code:team.split(' ').map(x=>x[0]).join('').slice(0,3).toUpperCase()}
function tableHtml(key,compact=false){let team=key==='national'?game.player.country:game.player.club,rows=sortedTable(key),cols=compact?`<div class="standing-row head"><span>#</span><span>TIME</span><span>J</span><span>SG</span><span>PTS</span></div>`:`<div class="standing-row head"><span>#</span><span>TIME</span><span>J</span><span>V</span><span>E</span><span>D</span><span>GP</span><span>GC</span><span>SG</span><span>PTS</span></div>`;return cols+rows.map((r,i)=>compact?`<div class="standing-row ${r.team===team?'me':''}"><span class="pos">${i+1}</span><span>${r.team}</span><b>${r.p}</b><b>${r.gd}</b><b>${r.pts}</b></div>`:`<div class="standing-row ${r.team===team?'me':''}"><span class="pos">${i+1}</span><span>${r.team}</span><b>${r.p}</b><b>${r.w}</b><b>${r.d}</b><b>${r.l}</b><b>${r.gf}</b><b>${r.ga}</b><b>${r.gd}</b><b>${r.pts}</b></div>`).join('')}
function nextMatch(){return game.season.schedule.find(x=>!x.played)}
function central(){let n=nextMatch(),t=game.season.totals,team=n?(n.competition==='Eliminatórias'?game.player.country:game.player.club):game.player.club,tableKey=n&&n.table?n.table:'league',pos=positionIn('league',game.player.club);return `<div class="dashboard"><aside class="box player-card"><div><span class="eyebrow">${game.player.country} · ${game.player.position}</span><div class="player-name">${esc(game.player.name)}</div><div class="club-line">${game.player.club}</div><div class="ovr-wrap"><div class="ovr">${game.player.overall}</div><div class="shirt-no">#${game.player.number}</div></div><div class="xp-track"><b style="width:${game.player.xp}%"></b></div><div class="xp-label"><span>EVOLUÇÃO</span><span>${game.player.xp}/100 XP</span></div></div><div class="player-info"><div><span>Posição</span><br>${POSITIONS[game.player.position].name}</div><div><span>Idade</span><br>${game.player.age} anos</div><div><span>Valor estimado</span><br>€ ${(2+Math.max(0,game.player.overall-65)*1.35).toFixed(1)} mi</div><div><span>Potencial</span><br>${game.player.potential}</div></div><div class="career-totals"><h3>TEMPORADA</h3><div class="mini-total"><div><b>${t.games}</b><small>JOGOS</small></div><div><b>${t.goals}</b><small>GOLS</small></div><div><b>${t.assists}</b><small>ASSIST.</small></div></div></div></aside><section class="center">${n?`<article class="box next-match"><div class="next-top"><span class="comp">${n.competition} · ${n.stage}</span><span class="date">${formatDate(n.date)} · ${n.home===team?'CASA':'FORA'}</span></div><div class="fixture"><div class="team"><b>${badge(n.home)}</b><strong>${n.home}</strong></div><div class="versus">VS</div><div class="team"><b>${badge(n.away)}</b><strong>${n.away}</strong></div></div><div class="match-actions"><button class="primary" onclick="playNext()">JOGAR ESTA PARTIDA ▶</button><button class="outline" onclick="setTab('calendario')">VER CALENDÁRIO</button></div></article>`:`<article class="box empty-state"><h2>Temporada encerr function classifications3(){let opts=[['league',G.season.leagueName],...(G.season.tables.continental.length?[['continental',G.season.continentalName]]:[]),['national',G.season.international]],k=G.tableView||'league';if(!G.season.tables[k]||!G.season.tables[k].length)k='league';let br=['Brasil','BrasilB'].includes(divisionKey()),first=divisionKey()!=='BrasilB';return `<section class="box full-panel"><div class="table-tools">${opts.map(o=>`<button class="filter ${k===o[0]?'active':''}" onclick="G3.view('${o[0]}')">${o[1]}</button>`).join('')}</div><div class="table-layout"><div class="big-table">${table3(k)}</div><aside class="legend-box"><b>ANO ${G.year}</b><p>As outras partidas da rodada são simuladas quando você joga. Propostas aceitas passam a valer somente na temporada seguinte.</p>${k==='league'&&first?`<b>Vagas continentais</b><p>A faixa azul marca as posições de classificação: seis vagas no Brasil e quatro nas demais primeiras divisões.</p>`:''}${k==='continental'?`<b>Formato continental</b><p>São 32 clubes. A chave aleatória só é sorteada depois da fase de grupos e os confrontos seguintes dependem dos vencedores.</p>`:''}${br&&k==='league'?`<b>Acesso e rebaixamento</b><p>${divisionKey()==='BrasilB'?'Os quatro primeiros sobem para a Série A.':'Os quatro últimos caem para a Série B.'} As faixas coloridas mostram a zona decisiva.</p>`:''}<b>Seleção</b><p>${G.player.called?`Convocado para ${G.season.international}.`:`Exigência atual: overall 76, oito jogos e média 7,0.`}</p></aside></div>${k==='continental'?continentalOverview3():k==='league'?leaderBoard3():''}</section>`}

function honorsHtml(list,empty){return list.length?list.slice().reverse().map(x=>`<div class="honor-card"><span class="icon">${x.icon}</span><b>${x.title}</b><small>${x.year} · ${x.club}<br>${x.detail}</small></div>`).join(''):`<div class="honor-empty">${empty}</div>`}function status3(){let c=G.career,avg=c.games?(c.ratingSum/c.games).toFixed(1):'—',seasonAvg=G.season.totals.games?(G.season.totals.ratingSum/G.season.totals.games).toFixed(1):'—',cs=c.clubStats,ns=c.nationalStats;return `<div class="status-layout"><section><article class="box status-hero"><span class="eyebrow">STATUS DO PERSONAGEM</span><h2>${e(G.player.name)}</h2><p>${G.player.club} · Camisa ${G.player.number} · ${POS[G.player.position].name}</p><div class="status-numbers"><div><b>${G.player.overall}</b><small>OVERALL</small></div><div><b>${G.player.potential}</b><small>POTENCIAL</small></div><div><b>+${G.player.overall-(G.player.startOverall||G.player.overall)}</b><small>EVOLUÇÃO TOTAL</small></div><div><b>${avg}</b><small>MÉDIA DA CARREIRA</small></div></div></article><article class="box honors" style="margin-top:14px"><h2 class="panel-title">NÚMEROS POR EQUIPE</h2><span class="eyebrow">CLUBES</span><div class="status-numbers"><div><b>${cs.games}</b><small>JOGOS</small></div><div><b>${cs.goals}</b><small>GOLS</small></div><div><b>${cs.assists}</b><small>ASSISTÊNCIAS</small></div><div><b>${c.motm||0}</b><small>ATUAÇÕES 8,5+</small></div></div><span class="eyebrow" style="display:block;margin-top:20px">SELEÇÃO · ${G.player.country}</span><div class="status-numbers"><div><b>${ns.games}</b><small>JOGOS</small></div><div><b>${ns.goals}</b><small>GOLS</small></div><div><b>${ns.assists}</b><small>ASSISTÊNCIAS</small></div><div><b>${G.player.called?'SIM':'NÃO'}</b><small>CONVOCADO</small></div></div></article><article class="box honors" style="margin-top:14px"><h2 class="panel-title">DESEMPENHO EM ${G.year}</h2><div class="status-numbers"><div><b>${G.season.totals.games}</b><small>JOGOS</small></div><div><b>${G.season.totals.goals}</b><small>GOLS</small></div><div><b>${G.season.totals.assists}</b><small>ASSISTÊNCIAS</small></div><div><b>${seasonAvg}</b><small>NOTA MÉDIA</small></div></div></article></section><aside><section class="box honors"><h2 class="panel-title">POPULARIDADE</h2><div class="fan-big">${G.player.fans.toLocaleString('pt-BR')} FÃS</div><div class="pop-track"><b style="width:${G.player.popularity}%"></b></div><p>Popularidade ${G.player.popularity}/100. Boas atuações, títulos e jogos pela seleção aumentam sua torcida.</p></section><section class="box honors" style="margin-top:14px"><h2 class="panel-title">TROFÉUS COLETIVOS</h2><div class="honors-grid">${honorsHtml(c.trophies,'Os troféus conquistados pelo clube aparecerão aqui.')}</div></section><section class="box honors" style="margin-top:14px"><h2 class="panel-title">PRÊMIOS INDIVIDUAIS</h2><div class="honors-grid">${honorsHtml(c.awards,'Artilharia, craque da temporada e outros prêmios aparecerão aqui.')}</div></section></aside></div>`}
function train3(k){let t=G.player.training;if(t.points<=0||G.player.attributes[k]>=99)return;G.player.attributes[k]++;t.points--;let derived=attributeOverall3();if(t.points===0&&derived>G.player.overall&&G.player.overall<G.player.potential)G.player.overall++;save3();render3()}function training3(){let labels={pace:'Ritmo',shooting:'Finalização',passing:'Passe',dribbling:'Drible',defending:'Defesa',physical:'Físico'},t=G.player.training,recharge=(6-G.career.games%6)||6;return `<div class="training-layout"><section class="box honors"><span class="eyebrow">CENTRO DE TREINAMENTO</span><h2 class="panel-title">ESCOLHA AS VALÊNCIAS</h2><p>Você tem <b>${t.points} de ${t.max}</b> sessões disponíveis. Uma sessão é recuperada a cada seis partidas. O overall só reage depois que o conjunto das valências evolui.</p><div class="attribute-grid">${Object.entries(G.player.attributes).map(([k,v])=>`<div class="attribute-card"><span>${labels[k].toUpperCase()}</span><b>${v}</b><button ${t.points<=0||v>=99?'disabled':''} onclick="G3.train('${k}')">TREINAR +1</button></div>`).join('')}</div></section><aside class="box honors"><span class="eyebrow">PROGRESSÃO CONTROLADA</span><h2 class="panel-title">OVERALL ${G.player.overall}</h2><p>As partidas agora concedem aproximadamente 38% do XP anterior. Treinar melhora atributos específicos, mas não garante um aumento imediato de overall.</p><div class="xp-track"><b style="width:${G.player.xp}%"></b></div><div class="xp-label"><span>EVOLUÇÃO</span><span>${G.player.xp}/100 XP</span></div><h3 style="margin-top:25px">PRÓXIMA RECARGA</h3><p>${recharge} partida(s) até recuperar uma sessão.</p></aside></div>`}
function chooseLife3(i){let ev=G.lifeEvent,id=ev.id,l=G.life,p=G.player,note='';if(id==='teammate'){if(i===0){l.cash=Math.max(0,l.cash-1500);p.synergy=Math.min(100,p.synergy+12);p.mental=Math.min(100,p.mental+5);p.managerTrust=Math.min(100,p.managerTrust+3);note='Conversa resolveu o atrito e aproximou o elenco.'}else{p.synergy=Math.max(0,p.synergy-14);p.popularity=Math.min(100,p.popularity+3);p.mental=Math.max(0,p.mental-3);note='A discussão pública aumentou a atenção e dividiu o vestiário.'}}else if(id==='sponsor'){if(i===0){let brands=['Vértice Sports','Pulse Energy','Atlas Wear','Nexo Mobile'],brand=brands[l.sponsors.length%brands.length];l.sponsors.push({brand,value:12000+Math.round(p.fans/20)});l.cash+=12000;p.popularity=Math.min(100,p.popularity+5);p.mental=Math.max(0,p.mental-2);note=`Contrato assinado com ${brand}.`}else{p.mental=Math.min(100,p.mental+3);note='Você recusou a oferta e manteve o foco esportivo.'}}else if(id==='media'){l.scandals++;if(i===0){l.cash=Math.max(0,l.cash-2500);p.popularity=Math.max(0,p.popularity-2);p.mental=Math.min(100,p.mental+4);note='A retratação conteve a crise.'}else{p.popularity=Math.max(0,p.popularity-8);p.fans=Math.max(0,p.fans-Math.round(p.fans*.08));p.mental=Math.max(0,p.mental-7);note='O confronto ampliou a repercussão negativa.'}}else if(id==='relationship'){if(i===0){l.cash=Math.max(0,l.cash-15000);l.relationship='Casado';p.mental=Math.min(100,p.mental+12);note='A estabilidade pessoal fortaleceu seu estado mental.'}else{p.mental=Math.max(0,p.mental-5);p.managerTrust=Math.min(100,p.managerTrust+2);note='A carreira ganhou prioridade, mas houve desgaste pessoal.'}}else{if(i===0){let cost=Math.min(20000,l.cash);l.cash-=cost;l.assets+=Math.round(cost*1.15);p.mental=Math.min(100,p.mental+3);note='Parte do dinheiro virou patrimônio.'}else{let cost=Math.min(15000,l.cash);l.cash-=cost;l.assets+=Math.round(cost*.25);p.popularity=Math.min(100,p.popularity+4);p.fans+=500;note='A compra gerou exposição, mas perdeu valor rapidamente.'}}l.choices.unshift({year:G.year,title:ev.title,note});G.lifeEvent=null;p.mood=p.mental>=75?'Confiante':p.mental>=45?'Estável':'Inseguro';save3();render3()}function life3(){let l=G.life,p=G.player,history=l.choices||[];return `<div class="life-layout"><section class="box honors"><span class="eyebrow">VIDA PESSOAL E CARREIRA</span><h2 class="panel-title">FORA DAS QUATRO LINHAS</h2><div class="life-stats"><div class="life-stat"><b>€ ${l.cash.toLocaleString('pt-BR')}</b><small>CAIXA</small></div><div class="life-stat"><b>€ ${l.assets.toLocaleString('pt-BR')}</b><small>PATRIMÔNIO</small></div><div class="life-stat"><b>€ ${p.salary.toLocaleString('pt-BR')}</b><small>SALÁRIO MENSAL</small></div><div class="life-stat"><b>${l.relationship}</b><small>RELACIONAMENTO</small></div></div><h3>ESTADO MENTAL · ${p.mood}</h3><div class="relation-bar"><b style="width:${p.mental}%"></b></div><h3>SINERGIA COM O ELENCO · ${p.synergy}/100</h3><div class="relation-bar"><b style="width:${p.synergy}%"></b></div><h3>CONFIANÇA DO TÉCNICO · ${p.managerTrust}/100</h3><div class="relation-bar"><b style="width:${p.managerTrust}%"></b></div><p>Sinergia melhora a participação em gols. Confiança define minutos e posição na hierarquia. O estado mental interfere levemente nas notas e pode ser afetado por decisões pessoais.</p></section><aside><section class="box honors"><h2 class="panel-title">PATROCÍNIOS</h2>${l.sponsors.length?l.sponsors.map(s=>`<div class="recap-line"><span>${s.brand}</span><b>€ ${s.value.toLocaleString('pt-BR')}/ano</b></div>`).join(''):`<div class="honor-empty">Mais fãs e popularidade aumentam a chance de propostas comerciais.</div>`}</section><section class="box honors" style="margin-top:14px"><h2 class="panel-title">DECISÕES RECENTES</h2>${history.length?history.slice(0,8).map(x=>`<div class="headline"><time>${x.year}</time><b>${x.title}<br><small>${x.note}</small></b></div>`).join(''):`<div class="honor-empty">Eventos com colegas, mídia, dinheiro e relacionamentos aparecerão durante a carreira.</div>`}</section></aside></div>`}function lifeOverlay3(){let ev=G.lifeEvent;return `<div class="choice-overlay"><article class="choice-card"><span class="eyebrow">ESCOLHA COM CONSEQUÊNCIAS</span><h2>${ev.title}</h2><p>${ev.text}</p><div class="choice-actions">${ev.choices.map((c,i)=>`<button onclick="G3.life(${i})"><b>${c[0]}</b><small>${c[1]}</small></button>`).join('')}</div></article></div>`}function noticeOverlay3(){return `<div class="choice-overlay"><article class="choice-card"><span class="eyebrow">NOTIFICAÇÃO DA CARREIRA</span><h2>${G.notice.title}</h2><p>${G.notice.text}</p><button class="primary" onclick="G3.notice()">CONTINUAR →</button></article></div>`}function closeNotice3(){G.notice=null;save3();render3()}
function seasonSummaryOverlay3(){let r=G.season.recap,h=[...r.trophies,...r.awards];return `<div class="choice-overlay"><article class="choice-card" style="width:min(820px,100%)"><span class="eyebrow">RESUMO DA TEMPORADA ${r.year}</span><h2>${r.club}</h2><div class="season-recap"><div class="recap-card"><h3>DESEMPENHO</h3><div class="recap-line"><span>Competição nacional</span><b>${r.position}º · ${r.league}</b></div><div class="recap-line"><span>Jogos</span><b>${r.games}</b></div><div class="recap-line"><span>Gols</span><b>${r.goals}</b></div><div class="recap-line"><span>Assistências</span><b>${r.assists}</b></div><div class="recap-line"><span>Nota média</span><b>${r.average}</b></div></div><div class="recap-card"><h3>O QUE VOCÊ GANHOU</h3>${h.length?h.map(x=>`<div class="recap-line"><span>${x.icon} ${x.title}</span><b>${x.detail}</b></div>`).join(''):'<p>Nenhum título ou prêmio nesta temporada.</p>'}<div class="recap-line"><span>Overall final</span><b>${r.overall}</b></div><div class="recap-line"><span>Potencial atual</span><b>${r.potential}</b></div></div></div><button class="primary" onclick="G3.recap()">VER MERCADO E PRÓXIMA TEMPORADA →</button></article></div>`}function closeRecap3(){G.season.recap.recapSeen=true;save3();render3()}

function proposal3(){let p=G.proposal,c=club(G.player.club);return `<div class="report-overlay"><article class="proposal-card"><span class="eyebrow">PROPOSTA OFICIAL</span><div class="proposal-badge">${p.code}</div><h2>${p.club}</h2><p>O clube quer contratar você para a temporada ${G.year+1}.</p><div class="proposal-data"><div><b>${LEAGUES[p.league].name}</b><small>LIGA</small></div><div><b>${p.strength}</b><small>FORÇA DO ELENCO</small></div><div><b>${p.strength>c.strength?'↑ DESAFIO':'—'}</b><small>NÍVEL</small></div></div><div class="proposal-actions"><button class="outline" onclick="G3.offer(false)">RECUSAR</button><button class="primary" onclick="G3.offer(true)">ACEITAR PROPOSTA →</button></div></article></div>`}
function setup3(){return `<main class="shell setup"><section class="setup-card"><span class="eyebrow">NOVA CARREIRA</span><h1>Seu começo<br>é sorteado.</h1><p>Escolha apenas nome, nacionalidade e posição. Ao começar, o jogo revelará seu overall, potencial, camisa atribuída e três clubes interessados.</p><div class="form-grid"><div class="field"><label>NOME DO JOGADOR</label><input id="name3" maxlength="18" value="${e(G.player.name)}" oninput="G3.name(this.value)" placeholder="Nome na camisa"></div><div class="field"><label>NACIONALIDADE</label><select onchange="G3.set('country',this.value)">${Object.keys(NATIONS).map(n=>`<option ${G.player.country===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field full"><label>POSIÇÃO</label><div class="positions">${Object.entries(POS).map(([k,v])=>`<button class="pick ${G.player.position===k?'sel':''}" onclick="G3.set('position','${k}')">${k}<small>${v.name}</small></button>`).join('')}</div></div><div class="random-strip"><div class="random-card"><small>CAMISA</small><b class="locked-value">REVELADA AO COMEÇAR</b></div><div class="random-card"><small>OVERALL INICIAL</small><b class="locked-value">REVELADO AO COMEÇAR</b></div><div class="random-card"><small>POTENCIAL</small><b class="locked-value">REVELADO AO COMEÇAR</b></div></div></div><button class="primary start" onclick="G3.start()">COMEÇAR A CAMPANHA <span>→</span></button></section></main>`}
function clubChoice3(){return `<main class="shell setup"><section class="setup-card club-choice"><span class="eyebrow">PRIMEIROS CONTRATOS · ${G.year}</span><h1>Três portas<br>se abriram.</h1><p>${e(G.player.name)}, estes são os dados sorteados da sua carreira. A primeira camisa foi atribuída pelo clube e poderá ser escolhida por você depois de uma temporada completa.</p><div class="random-strip reveal-strip"><div class="random-card"><small>CAMISA ATRIBUÍDA</small><b>#${G.player.number}</b></div><div class="random-card"><small>OVERALL INICIAL</small><b>${G.player.overall}</b></div><div class="random-card"><small>POTENCIAL</small><b>${G.player.potential}</b></div></div><div class="offer-grid">${G.starterOffers.map((c,i)=>`<button class="start-offer" onclick="G3.choose('${c.name.replace(/'/g,"\\'")}')"><div class="start-badge">${c.code}</div><span>PROPOSTA ${i+1} · ${c.league==='BrasilB'?'BRASIL':c.league.toUpperCase()}</span><h2>${c.name}</h2><p>${c.league===G.player.country||c.league==='BrasilB'?'Clube do seu país: adaptação e chance de jogar mais cedo.':'Oportunidade no exterior: desafio maior desde o primeiro ano.'}</p><div class="offer-facts"><b>${(c.league==='BrasilB'?BRAZIL_B:LEAGUES[c.league]).name}</b><b>FORÇA ${c.strength}</b><b>${c.league==='BrasilB'?'LUTA PELO ACESSO':'FIM DE TABELA'}</b></div></button>`).join('')}</div><div class="chance-note">O sorteio favorece fortemente clubes do país da nacionalidade, incluindo oportunidades na Série B brasileira.</div></section></main>`}
function screen3(){let body=G.tab==='central'?central3():G.tab==='calendario'?calendar3():G.tab==='tabelas'?classifications3():G.tab==='status'?status3():G.tab==='treino'?training3():G.tab==='vida'?life3():evolution3(),c=clubColors3(),recap=G.season.recap&&!G.season.recap.recapSeen,overlay=G.report?report3():recap?seasonSummaryOverlay3():G.notice?noticeOverlay3():G.lifeEvent?lifeOverlay3():G.proposal?proposal3():'';return `<main class="shell game-shell" style="--club1:${c.a};--club2:${c.b};--clubText:${c.text}"><header class="game-head"><div class="season-title"><span>CARREIRA · ${league().name}</span><h1>${G.player.club}</h1></div><div class="year-chip">${G.year}</div><nav class="tabs"><button class="tab ${G.tab==='central'?'active':''}" onclick="G3.tab('central')">CENTRAL</button><button class="tab ${G.tab==='calendario'?'active':''}" onclick="G3.tab('calendario')">CALENDÁRIO</button><button class="tab ${G.tab==='tabelas'?'active':''}" onclick="G3.tab('tabelas')">CLASSIFICAÇÕES</button><button class="tab ${G.tab==='evolucao'?'active':''}" onclick="G3.tab('evolucao')">EVOLUÇÃO</button><button class="tab ${G.tab==='treino'?'active':''}" onclick="G3.tab('treino')">TREINAMENTO</button><button class="tab ${G.tab==='vida'?'active':''}" onclick="G3.tab('vida')">VIDA & CARREIRA</button><button class="tab ${G.tab==='status'?'active':''}" onclick="G3.tab('status')">STATUS</button></nav></header><div class="career-bar"><span class="role-chip">${G.player.squadRole}</span><b>Confiança ${G.player.managerTrust}/100</b><span>Sinergia ${G.player.synergy}/100</span><span class="${G.player.mental<45?'mental-bad':'mental-good'}">${G.player.mood} · Mental ${G.player.mental}/100</span><span>${G.player.yellowCards}/3 cartões</span></div>${body}</main>${overlay}`}
function render3(){document.getElementById('app').innerHTML=G.screen==='setup'?setup3():G.screen==='club-choice'?clubChoice3():screen3()}
window.G3={set:setP,name:setName3,start:start3,choose:chooseStarter,randomize,number:chooseNumber3,train:train3,life:chooseLife3,notice:closeNotice3,recap:closeRecap3,play:play3,close:close3,offer:answerOffer,advance:advanceYear,tab:tab3,view:view3,filter:filter3,month:month3,open:openMatch};window.newCareer=reset3;render3();
})();
</script>
</body>

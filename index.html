function chooseLife3(i){let ev=G.lifeEvent,id=ev.id,l=G.life,p=G.player,note='';if(id==='teammate'){if(i===0){l.cash=Math.max(0,l.cash-1500);p.synergy=Math.min(100,p.synergy+12);p.mental=Math.min(100,p.mental+5);p.managerTrust=Math.min(100,p.managerTrust+3);note='Conversa resolveu o atrito e aproximou o elenco.'}else{p.synergy=Math.max(0,p.synergy-14);p.popularity=Math.min(100,p.popularity+3);p.mental=Math.max(0,p.mental-3);note='A discussão pública aumentou a atenção e dividiu o vestiário.'}}else if(id==='sponsor'){if(i===0){let brands=['Vértice Sports','Pulse Energy','Atlas Wear','Nexo Mobile'],brand=brands[l.sponsors.length%brands.length];l.sponsors.push({brand,value:12000+Math.round(p.fans/20)});l.cash+=12000;p.popularity=Math.min(100,p.popularity+5);p.mental=Math.max(0,p.mental-2);note=`Contrato assinado com ${brand}.`}else{p.mental=Math.min(100,p.mental+3);note='Você recusou a oferta e manteve o foco esportivo.'}}else if(id==='media'){l.scandals++;if(i===0){l.cash=Math.max(0,l.cash-2500);p.popularity=Math.max(0,p.popularity-2);p.mental=Math.min(100,p.mental+4);note='A retratação conteve a crise.'}else{p.popularity=Math.max(0,p.popularity-8);p.fans=Math.max(0,p.fans-Math.round(p.fans*.08));p.mental=Math.max(0,p.mental-7);note='O confronto ampliou a repercussão negativa.'}}else if(id==='relationship'){if(i===0){l.cash=Math.max(0,l.cash-15000);l.relationship='Casado';p.mental=Math.min(100,p.mental+12);note='A estabilidade pessoal fortaleceu seu estado mental.'}else{p.mental=Math.max(0,p.mental-5);p.managerTrust=Math.min(100,p.managerTrust+2);note='A carreira ganhou prioridade, mas houve desgaste pessoal.'}}else{if(i===0){let cost=Math.min(20000,l.cash);l.cash-=cost;l.assets+=Math.round(cost*1.15);p.mental=Math.min(100,p.mental+3);note='Parte do dinheiro virou patrimônio.'}else{let cost=Math.min(15000,l.cash);l.cash-=cost;l.assets+=Math.round(cost*.25);p.popularity=Math.min(100,p.popularity+4);p.fans+=500;note='A compra gerou exposição, mas perdeu valor rapidament o durante a carreira.</div>`}</section></aside></div>`}function lifeOverlay3(){let ev=G.lifeEvent;return `<div class="choice-overlay"><article class="choice-card"><span class="eyebrow">ESCOLHA COM CONSEQUÊNCIAS</span><h2>${ev.title}</h2><p>${ev.text}</p><div class="choice-actions">${ev.choices.map((c,i)=>`<button onclick="G3.life(${i})"><b>${c[0]}</b><small>${c[1]}</small></button>`).join('')}</div></article></div>`}function noticeOverlay3(){return `<div class="choice-overlay"><article class="choice-card"><span class="eyebrow">NOTIFICAÇÃO DA CARREIRA</span><h2>${G.notice.title}</h2><p>${G.notice.text}</p><button class="primary" onclick="G3.notice()">CONTINUAR →</button></article></div>`}function closeNotice3(){G.notice=null;save3();render3()}

function meter3(v,d){return Math.max(0,Math.min(100,Math.round(v+(d>0?Math.max(.5,d*(100-v)/100):d))))}

function credibleNationalName3(n){let first=['Mateo','Gabriel','Lucas','Noah','Liam','Hugo','Youssef','Takefusa','Min-jae','Victor','Daniel','Adam','Ivan','Omar','Samuel','Nicolás'],last=['Silva','Romero','Müller','Martin','Rossi','Costa','Williams','Kovač','El Amrani','Tanaka','Kim','Diallo','Okafor','Nowak','Petrovic','Torres'];let h=hash3('seleção-'+n);return first[h%first.length]+' '+last[Math.floor(h/17)%last.length]}
function updateLeaderBoard3(m,r){let map=allLeaders3(),key=competitionKey3(m),list=map[key];if(!list)return;let team=key==='national'?G.player.country:G.player.club,mine=list.find(x=>x.club===team);if(!mine){mine={name:G.player.name,club:team,goals:0,assists:0};list.push(mine)}mine.name=G.player.name;mine.goals+=m.report.stats.goals;mine.assists+=m.report.stats.assists;list.filter(x=>x!==mine).forEach(x=>{let q=(STRENGTH[x.club]||76)/100;if(r()<q*.42)x.goals+=1+(r()>.96?1:0);if(r()<q*.34)x.assists++})}
function stats3(r,tg){let p=G.player.position,x=POS[p],at=G.player.attributes,minutes=minutes3(r),share=minutes/90,chem=.72+(G.player.synergy+G.player.mental)/500,m=k=>Math.max(.78,Math.min(1.22,1+(at[k]-G.player.overall)/90)),g=0,a=0;for(let i=0;i<tg;i++){if(r()<x.goal*share*chem*m('shooting')*(.93+.07*m('dribbling')))g++;else if(r()<x.assist*share*chem*m('passing'))a++}let shots=Math.round((r()*3+g+(['W','SS','ST'].includes(p)?2:0))*share*m('shooting')),cardRisk={CB:.25,FB:.16,DM:.23,CM:.12,AM:.07,W:.05,SS:.05,ST:.06}[p],yellow=r()<cardRisk*share?1:0,red=yellow&&r()<.055?1:0;return{minutes,goals:g,assists:a,yellow,red,shots,shotsOn:Math.min(shots,Math.round(shots*(.38+r()*.32)*m('shooting'))),xg:+(shots*(.12+r()*.13)).toFixed(2),passes:Math.round((18+r()*38+(['DM','CM','AM'].includes(p)?20:0))*share*m('passing')),passPct:Math.min(96,Math.round((70+r()*16+(G.player.overall-65)*.2)*m('passing'))),keyPasses:Math.round((r()*3+(['CM','AM'].includes(p)?2:0))*share*m('passing')),dribbles:Math.round((r()*4+(['AM','W','SS'].includes(p)?2:0))*share*m('dribbling')),crosses:Math.round((r()*4+(['FB','W'].includes(p)?2:0))*share*m('passing')),tackles:Math.round((r()*4+(['CB','FB','DM'].includes(p)?2:0))*share*m('defending')),interceptions:Math.round((r()*3+(['CB','DM'].includes(p)?2:0))*share*m('defending')),clearances:Math.round((r()*4+(p==='CB'?3:0))*share*m('defending')),duels:Math.round((2+r()*6+(p==='CB'||p==='ST'?2:0))*share*m('physical'))}}

function injury3(m){let s=m.report.stats,physical=G.player.attributes.physical,chance=Math.max(.006,Math.min(.045,.008+s.minutes/90*.025-(physical-60)*.0003)),r=rng3(hash3('lesão-'+m.id+G.player.name));if(!G.player.injuryGames&&r()<chance){let types=[['Contusão muscular',1,2],['Entorse no tornozelo',2,4],['Lesão na coxa',3,6],['Trauma no joelho',4,8]],t=types[Math.floor(r()*types.length)];G.player.injuryGames=t[1]+Math.floor(r()*(t[2]-t[1]+1));G.player.injuryName=t[0];G.player.mental=meter3(G.player.mental,-4);G.notice={title:'BOLETIM MÉDICO',text:`${G.player.name} sofreu ${t[0].toLowerCase()} e deve perder cerca de ${G.player.injuryGames} partida(s).`};G.season.headlines.unshift({date:'LESÃO',text:`ALARME NO ${G.player.club.toUpperCase()}: ${G.player.name} vai para o departamento médico.`})}}
function processPending3(){let due=(G.life.pending||[]).filter(x=>x.due<=G.career.games);G.life.pending=(G.life.pending||[]).filter(x=>x.due>G.career.games);due.forEach(x=>{let r=rng3(hash3(x.type+G.player.name+G.career.games)),text='';if(x.type==='startup'){let good=r()>.52,delta=good?240000:-35000;G.life.cash=Math.max(0,G.life.cash+delta);G.life.assets=Math.max(0,G.life.assets+(good?140000:-25000));text=good?'A startup recebeu investimento e valorizou fortemente.':'A startup perdeu um contrato e exigiu novo aporte.'}else if(x.type==='bet'){let bad=r()<.42;if(bad){G.player.popularity=meter3(G.player.popularity,-6);G.player.mental=meter3(G.player.mental,-4);text='Uma investigação sobre a casa de apostas respingou na sua imagem.'}else text='A campanha com a casa de apostas terminou sem crise e pagou o bônus.'}else if(x.type==='media'){let good=r()>.48;G.player.popularity=meter3(G.player.popularity,good?3:-5);text=good?'Novas imagens provaram que a acusação era exagerada.':'A versão confrontadora perdeu força e a crise voltou.'}else if(x.type==='family'){G.life.children++;G.player.mental=meter3(G.player.mental,4);text=`A família cresceu: agora você tem ${G.life.children} filho(s).`}if(text){G.notice={title:'CONSEQUÊNCIA DA SUA ESCOLHA',text};G.season.headlines.unshift({date:'DESDOBRAMENTO',text})}})}

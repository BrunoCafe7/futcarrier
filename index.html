<h2>PRÓXIMO ANO</h2><p>${G.player.nextClub?`A transferência para o ${G.player.nextClub} será concluída. O novo clube atribuirá outra camisa.`:`Você continuará no ${G.player.club}.`}</p>${!G.player.numberChosen&&!G.player.nextClub?`<div class="number-unlock"><span class="eyebrow">UMA TEMPORADA COMPLETA NO CLUBE</span><h3>Agora você escolhe sua camisa</h3><p>O número escolhido ficará com você enquanto permanecer neste clube.</p><div class="number-choices">${shirts.map(x=>`<button class="number-choice ${G.player.number===x?'selected':''}" onclick="G3.number(${x})">${x}</button>`).join('')}</div></div>`:G.player.numberChosen&&!G.player.nextClub?`<div class="number-unlock"><span class="eyebrow">CAMISA ESCOLHIDA</span><h3>#${G.player.number} no ${G.player.club}</h3></div>`:''}<button class="primary" onclick="G3.advance()">INICIAR TEMPORADA ${G.year+1} →</button></article>`}<div class="season-summary"><div><b>${t.games}</b><small>JOGOS</small></div><div><b>${t.goals}</b><small>GOLS</small></div><div><b>${t.assists}</b><small>ASSIST.</small></div><div><b>${t.games?(t.ratingSum/t.games).toFixed(1):'—'}</b><small>NOTA</small></div><div><b>${pos}º</b><small>NA LIGA</small></div></div><article class="box headlines"><h2 class="panel-title">▣ MANCHETES</h2>${G.season.headlines.slice(0,7).map(h=>`<div class="headline ${h.date==='CONVOCAÇÃO'?'callup':''}"><time>${h.date}</time><b>${h.text}</b></div>`).join('')}</article></section><aside class="box side"><div class="side-head"><h2>${key==='league'?G.season.leagueName:key==='continental'?G.season.continentalName:G.season.international}</h2></div>${table3(key,true)}</aside></div>`}
function calendar3(){let x=new Date((G.calendarMonth||`${G.year}-03`)+'-01T12:00:00'),year=x.getFullYear(),month=x.getMonth(),first=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate(),names=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'],comps=['Todos',G.season.leagueName,G.season.continentalName,G.season.cupName,G.season.international],next=next3(),cells='';for(let i=0;i<first;i++)cells+='<div class="day-cell out"></div>';for(let d=1;d<=days;d++){let ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,events=G.season.schedule.filter(m=>m.date===ds&&(G.filter==='Todos'||m.competition===G.filter));cells+=`<div class="day-cell"><div class="day-num">${d}</div>${events.map(m=>`<button class="cal-event ${m.table==='continental'?'continental':m.table==='national'?'international':''} ${m.played?'played':''} ${next&&next.id===m.id?'next':''}" onclick="G3.open('${m.id}')">${m.competition}<br><b>${m.home} × ${m.away}</b>${m.played?`<span class="cal-result">${m.result.home}–${m.result.away}</span>`:''}</button>`).join('')}</div>`}return `<section class="box full-panel"><div class="calendar-head"><div><span class="eyebrow">CALENDÁRIO ${G.year}</span><h2>${x.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h2></div><div class="month-nav"><button onclick="G3.month(-1)">‹</button><button onclick="G3.month(1)">›</button></div></div><div class="calendar-tools">${comps.map(c=>`<button class="filter ${G.filter===c?'active':''}" onclick="G3.filter('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')}</div><div class="month-grid">${names.map(n=>`<div class="weekday">${n}</div>`).join('')}${cells}</div></section>`}
function classifications3(){let opts=[['league',G.season.leagueName],['continental',G.season.continentalName],['national',G.season.international]],k=G.tableView||'league';return `<section class="box full-panel"><div class="table-tools">${opts.map(o=>`<button class="filter ${k===o[0]?'active':''}" onclick="G3.view('${o[0]}')">${o[1]}</button>`).join('')}</div><div class="table-layout"><div class="big-table">${table3(k)}</div><aside class="legend-box"><b>ANO ${G.year}</b><p>As outras partidas da rodada são simuladas quando você joga. Propostas aceitas passam a valer somente na temporada seguinte.</p><b>Seleção</b><p>${G.player.called?`Convocado para ${G.season.international}.`:`Exigência atual: overall 76, oito jogos e média 7,0.`}</p></aside></div></section>`}
function evolution3(){let h=[...G.season.history].reverse();return `<div class="evolution-grid"><section class="box full-panel"><h2 class="panel-title">EVOLUÇÃO EM ${G.year}</h2>${h.length?`<div class="evo-list">${h.map(x=>`<div class="evo-row"><span>${fmt(x.date)}<br><small>${x.competition}</small></span><strong>vs. ${x.opponent}</strong><span>NOTA ${x.rating}</span><span class="gain">${x.xp>=0?'+':''}${x.xp} XP</span></div>`).join('')}</div>`:`<div class="empty-state">Jogue para iniciar o histórico.</div>`}</section><aside class="box formula"><span class="eyebrow">CARREIRA</span><h2>${G.year} · ${G.player.age} anos</h2><p>O overall sobe a cada 100 XP, até o potencial ${G.player.potential}.</p><ul><li><b>Convocação:</b> overall 76+, oito jogos e média 7,0.</li><li><b>Mercado:</b> clubes mais fortes observam sua evolução.</li><li><b>Ciclos:</b> Copa do Mundo em 2026/2030; Euro e Copa América em 2028/2032.</li></ul></aside></div>`}
function report3(){let r=G.report,s=r.stats,prim=POS[G.player.position].primary,ms=['minutes','goals','assists','shots','shotsOn','xg','passes','passPct','keyPasses','dribbles','crosses','tackles','interceptions','clearances','duels'];return `<div class="report-overlay"><article class="report"><header class="report-score"><span class="comp">RELATÓRIO</span><div class="scoreline">${r.teamGoals} — ${r.oppGoals}</div><h2>${r.team} × ${r.opp}</h2></header><div class="report-grid"><section class="performance"><div class="rating-hero"><span>DESEMPENHO DE ${e(G.player.name).toUpperCase()}</span><b>${r.rating}</b></div><div class="metrics">${ms.map(k=>`<div class="metric ${prim.includes(k)?'characteristic':''}"><b>${k==='passPct'?s[k]+'%':s[k]}</b><small>${LABEL[k]}</small>${prim.includes(k)?'<em>★ CARACTERÍSTICO</em>':''}</div>`).join('')}</div></section><aside><section class="impact"><h3>EVOLUÇÃO</h3><div class="xp-big">${r.xp>=0?'+':''}${r.xp} XP</div><ul>${r.reasons.map(x=>`<li>${x}</li>`).join('')}</ul><div class="ovr-change"><span>OVERALL</span><b>${r.oldOvr} → ${r.newOvr}</b></div>${r.beforePos?`<div class="ovr-change"><span>TABELA</span><b>${r.beforePos}º → ${r.afterPos}º</b></div>`:''}</section><section class="events" style="margin-top:14px"><h3>PARTIDA</h3>${r.events.map(x=>`<div class="event"><b>${x.min}'</b><span>${x.text}</span></div>`).join('')}</section></aside></div><div class="report-actions"><button class="primary" onclick="G3.close()">CONTINUAR →</button></div></article></div>`}
function proposal3(){let p=G.proposal,c=club(G.player.club);return `<div class="report-overlay"><article class="proposal-card"><span class="eyebrow">PROPOSTA OFICIAL</span><div class="proposal-badge">${p.code}</div><h2>${p.club}</h2><p>O clube quer contratar você para a temporada ${G.year+1}.</p><div class="proposal-data"><div><b>${LEAGUES[p.league].name}</b><small>LIGA</small></div><div><b>${p.strength}</b><small>FORÇA DO ELENCO</small></div><div><b>${p.strength>c.strength?'↑ DESAFIO':'—'}</b><small>NÍVEL</small></div></div><div class="proposal-actions"><button class="outline" onclick="G3.offer(false)">RECUSAR</button><button class="primary" onclick="G3.offer(true)">ACEITAR PROPOSTA →</button></div></article></div>`}
function setup3(){return `<main class="shell setup"><section class="setup-card"><span class="eyebrow">NOVA CARREIRA</span><h1>Seu começo<br>é sorteado.</h1><p>Escolha apenas nome, nacionalidade e posição. Ao começar, o jogo revelará seu overall, potencial, camisa atribuída e três clubes interessados.</p><div class="form-grid"><div class="field"><label>NOME DO JOGADOR</label><input id="name3" maxlength="18" value="${e(G.player.name)}" oninput="G3.name(this.value)" placeholder="Nome na camisa"></div><div class="field"><label>NACIONALIDADE</label><select onchange="G3.set('country',this.value)">${Object.keys(NATIONS).map(n=>`<option ${G.player.country===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field full"><label>POSIÇÃO</label><div class="positions">${Object.entries(POS).map(([k,v])=>`<button class="pick ${G.player.position===k?'sel':''}" onclick="G3.set('position','${k}')">${k}<small>${v.name}</small></button>`).join('')}</div></div><div class="random-strip"><div class="random-card"><small>CAMISA</small><b class="locked-value">REVELADA AO COMEÇAR</b></div><div class="random-card"><small>OVERALL INICIAL</small><b class="locked-value">REVELADO AO COMEÇAR</b></div><div class="random-card"><small>POTENCIAL</small><b class="locked-value">REVELADO AO COMEÇAR</b></div></div></div><button class="primary start" onclick="G3.start()">COMEÇAR A CAMPANHA <span>→</span></button></section></main>`}
function clubChoice3(){return `<main class="shell setup"><section class="setup-card club-choice"><span class="eyebrow">PRIMEIROS CONTRATOS · ${G.year}</span><h1>Três portas<br>se abriram.</h1><p>${e(G.player.name)}, estes são os dados sorteados da sua carreira. A primeira camisa foi atribuída pelo clube e poderá ser escolhida por você depois de uma temporada completa.</p><div class="random-strip reveal-strip"><div class="random-card"><small>CAMISA ATRIBUÍDA</small><b>#${G.player.number}</b></div><div class="random-card"><small>OVERALL INICIAL</small><b>${G.player.overall}</b></div><div class="random-card"><small>POTENCIAL</small><b>${G.player.potential}</b></div></div><div class="offer-grid">${G.starterOffers.map((c,i)=>`<button class="start-offer" onclick="G3.choose('${c.name.replace(/'/g,"\\'")}')"><div class="start-badge">${c.code}</div><span>PROPOSTA ${i+1} · ${c.league.toUpperCase()}</span><h2>${c.name}</h2><p>${c.league===G.player.country?'Clube do seu país: adaptação e chance de jogar mais cedo.':'Oportunidade no exterior: desafio maior desde o primeiro ano.'}</p><div class="offer-facts"><b>${LEAGUES[c.league].name}</b><b>FORÇA ${c.strength}</b><b>FIM DE TABELA</b></div></button>`).join('')}</div><div class="chance-note">O sorteio favorece fortemente clubes do país da nacionalidade, mas uma proposta estrangeira pode aparecer.</div></section></main>`}
function screen3(){let body=G.tab==='central'?central3():G.tab==='calendario'?calendar3():G.tab==='tabelas'?classifications3():evolution3();return `<main class="shell"><header class="game-head"><div class="season-title"><span>CARREIRA · ${league().name}</span><h1>${G.player.club}</h1></div><div class="year-chip">${G.year}</div><nav class="tabs"><button class="tab ${G.tab==='central'?'active':''}" onclick="G3.tab('central')">CENTRAL</button><button class="tab ${G.tab==='calendario'?'active':''}" onclick="G3.tab('calendario')">CALENDÁRIO</button><button class="tab ${G.tab==='tabelas'?'active':''}" onclick="G3.tab('tabelas')">CLASSIFICAÇÕES</button><button class="tab ${G.tab==='evolucao'?'active':''}" onclick="G3.tab('evolucao')">EVOLUÇÃO</button></nav></header>${body}</main>${G.report?report3():G.proposal?proposal3():''}`}
function render3(){document.getElementById('app').innerHTML=G.screen==='setup'?setup3():G.screen==='club-choice'?clubChoice3():screen3()}
window.G3={set:setP,name:setName3,start:start3,choose:chooseStarter,randomize,number:chooseNumber3,play:play3,close:close3,offer:answerOffer,advance:advanceYear,tab:tab3,view:view3,filter:filter3,month:month3,open:openMatch};window.newCareer=reset3;render3();
})();
</script>
